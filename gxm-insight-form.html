<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GXM Insight Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light only}
*{box-sizing:border-box;margin:0;padding:0;color-scheme:light only}
html,body{background:#f8fafc;font-family:'Inter',-apple-system,sans-serif;color:#1e293b;font-size:14px;min-height:100vh;margin:0;padding:0;width:100%}
.topnav{background:#fff;border-bottom:1.5px solid #e2e8f0;padding:0 24px;display:flex;height:52px;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:#1a9e6e;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.logo-name{font-size:14px;font-weight:600;color:#1e293b}
.nav-link{font-size:13px;color:#64748b;text-decoration:none}
.nav-link:hover{color:#1a9e6e}
.page{padding:24px 16px;width:100%;box-sizing:border-box}
.fc{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;width:100%;max-width:640px;margin:0 auto;box-sizing:border-box}
/* Form header (guided mode) */
.ftop{padding:24px 28px 0}
.ftitle{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:4px}
.fsub{font-size:13px;color:#64748b;margin-bottom:18px}
.prow{display:flex;justify-content:space-between;margin-bottom:7px}
.plbl{font-size:11px;font-weight:700;color:#1a9e6e;text-transform:uppercase;letter-spacing:.07em}
.ptime{font-size:11px;color:#94a3b8}
.ptrack{height:4px;background:#e2e8f0;border-radius:2px}
.pfill{height:100%;background:#1a9e6e;border-radius:2px;transition:width .4s ease}
.fbody{padding:24px 28px}
.sey{font-size:10.5px;font-weight:700;color:#1a9e6e;text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px}
.stit{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px}
.shin{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.55}
.sdiv{font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 10px;padding-bottom:7px;border-bottom:1px solid #e2e8f0}
.fstack{display:flex;flex-direction:column;gap:14px}
.fld{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:12.5px;font-weight:600;color:#1e293b}
.req{color:#dc2626;font-size:11px;margin-left:2px}
.opt{font-size:11px;color:#94a3b8;font-weight:400;margin-left:4px}
input.inp,textarea.inp{display:block;width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13.5px;color:#1e293b;background:#fff;outline:none;font-family:inherit;resize:none;line-height:1.5;transition:border-color .15s,box-shadow .15s}
input.inp:focus,textarea.inp:focus{border-color:#1a9e6e;box-shadow:0 0 0 3px rgba(26,158,110,.1)}
input.inp::placeholder,textarea.inp::placeholder{color:#94a3b8}
input.inp.err,textarea.inp.err{border-color:#dc2626}
.ferr{font-size:11.5px;color:#dc2626;margin-top:4px;display:none}
.ferr.show{display:block}
/* Radio cards */
.rgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:10px}
.rc{border:1.5px solid #e2e8f0;border-radius:8px;padding:12px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;background:#fff;user-select:none;transition:border-color .13s,background .13s}
.rc:hover{border-color:#1a9e6e;background:rgba(26,158,110,.05)}
.rc.sel{border-color:#1a9e6e;background:rgba(26,158,110,.08)}
.rci{width:16px;height:16px;border-radius:50%;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .13s}
.rc.sel .rci{border-color:#1a9e6e;background:#1a9e6e}
.rcd{width:6px;height:6px;border-radius:50%;background:#fff;display:none}
.rc.sel .rcd{display:block}
.rct{font-size:12.5px;font-weight:600;color:#1e293b;margin-bottom:2px;line-height:1.3}
.rc.sel .rct{color:#1a9e6e}
.rcs{font-size:11px;color:#64748b;line-height:1.35}
/* Service line cards */
.sl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sl-card{border:1.5px solid #e2e8f0;border-radius:8px;padding:14px;cursor:pointer;background:#fff;user-select:none;transition:border-color .13s,background .13s;display:flex;flex-direction:column;gap:6px}
.sl-card:hover{border-color:#1a9e6e;background:rgba(26,158,110,.05)}
.sl-card.sel{border-color:#1a9e6e;background:rgba(26,158,110,.08)}
.sl-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sl-name{font-size:13px;font-weight:600;color:#1e293b}
.sl-card.sel .sl-name{color:#1a9e6e}
.sl-desc{font-size:11px;color:#64748b;line-height:1.4}
/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .13s;user-select:none}
.chip:hover{border-color:#1a9e6e;color:#1a9e6e;background:rgba(26,158,110,.05)}
.chip.sel{border-color:#1a9e6e;background:rgba(26,158,110,.08);color:#1a9e6e;font-weight:600}
/* Nav row */
.nav-row{display:flex;align-items:center;gap:10px;padding:16px 28px;border-top:1.5px solid #e2e8f0;background:#fff;border-radius:0 0 10px 10px}
.nrl{flex:1}
button.bcnl{background:transparent;border:none;padding:6px 0;font-size:13.5px;font-weight:700;color:#1e293b;cursor:pointer;text-decoration:underline;font-family:inherit}
button.bbk{background:#fff;border:2px solid #1a9e6e;border-radius:8px;padding:9px 22px;font-size:13.5px;font-weight:600;color:#1a9e6e;cursor:pointer;font-family:inherit}
button.bbk:hover{background:rgba(26,158,110,.08)}
button.bnxt{background:#1a9e6e;border:2px solid #1a9e6e;border-radius:8px;padding:9px 22px;font-size:13.5px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}
button.bnxt:hover{background:#158a5e;border-color:#158a5e}
/* Mode select */
.mode-card{border:1.5px solid #e2e8f0;border-radius:12px;padding:22px 24px;cursor:pointer;background:#fff;transition:all .15s;display:flex;align-items:flex-start;gap:16px;margin-bottom:12px}
.mode-card:hover{border-color:#1a9e6e;box-shadow:0 2px 12px rgba(26,158,110,.08)}
.mode-card:last-child{margin-bottom:0}
.mode-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.mode-title{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:3px}
.mode-desc{font-size:12.5px;color:#64748b;line-height:1.5}
.mode-tag{display:inline-block;margin-top:7px;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600}
/* Review screen */
.review-field{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:14px 16px;margin-bottom:10px}
.review-label{font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.review-val{font-size:13.5px;color:#1e293b;line-height:1.5}
.review-edit{font-size:11px;font-weight:600;color:#1a9e6e;cursor:pointer;text-decoration:none;padding:2px 8px;border-radius:4px;background:rgba(26,158,110,.08)}
.review-edit:hover{background:rgba(26,158,110,.15)}
.review-input{width:100%;padding:6px 0;border:none;border-bottom:1.5px solid #e2e8f0;background:transparent;font-size:13.5px;color:#1e293b;outline:none;font-family:inherit;margin-top:4px}
.review-input:focus{border-bottom-color:#1a9e6e}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600;background:rgba(26,158,110,.1);color:#1a9e6e;margin-left:6px}
/* Success */
.succ{text-align:center;padding:40px 16px}
.sico{width:52px;height:52px;border-radius:50%;background:rgba(26,158,110,.1);border:2px solid #1a9e6e;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.sico svg{width:24px;height:24px;stroke:#1a9e6e;stroke-width:2.5;fill:none}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── Responsive ─────────────────────────── */
@media(max-width:600px){
  .page{padding:16px 12px}
  .ftop{padding:18px 16px 0}
  .fbody{padding:16px 16px}
  .nav-row{padding:12px 16px}
  .rgrid{grid-template-columns:1fr 1fr}
  .sl-grid{grid-template-columns:1fr}
  .topnav{padding:0 16px}
}
@media(max-width:400px){
  .rgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="topnav">
  <div class="logo">
    <div class="logo-mark">GX</div>
    <div class="logo-name">GXM · HSP Group</div>
  </div>
  <a class="nav-link" href="gxm-dashboard.html">View dashboard →</a>
</div>
<div class="page">
  <div class="fc">
    <div class="ftop" id="ftop" style="display:none">
      <div class="ftitle">Log a GXM insight</div>
      <div class="fsub">One step at a time — most answers are a single tap.</div>
      <div class="prow">
        <span class="plbl" id="plbl">Before you begin</span>
        <span class="ptime" id="ptime">About 1 min</span>

      <div class="nrl"><button class="bcnl" onclick="confirmCancel()">Cancel</button></div>
      <span id="bbwrap"></span>
      <button class="bnxt" id="bnxt" onclick="advance()">Continue</button>
    </div>
  </div>
</div>

// ── Helpers ──
function radio(label, sub, selected, onclick) {
  return `<div class="rc${selected?' sel':''}" onclick="${onclick}">
    <div class="rci"><div class="rcd"></div></div>
    <div><div class="rct">${label}</div><div class="rcs">${sub}</div></div>
  </div>`;
}
function chip(label, selected, onclick) {
  return `<div class="chip${selected?' sel':''}" onclick="${onclick}">${label}</div>`;
}
function errMsg(msg, show) {
  return `<div class="ferr${show?' show':''}">${msg}</div>`;
}
function showChrome(show) {
  document.getElementById('ftop').style.display = show ? '' : 'none';
  document.getElementById('navrow').style.display = show ? '' : 'none';
}

function r7() {
  const sevs = [{k:'Critical',d:'Blocked or losing trust'},{k:'Significant',d:'Major friction, workarounds needed'},{k:'Minor',d:'Nice to have, low urgency'}];

const STEPS = [r0,r1,r2,r3,r4,r5,r6,r7,r8];

function renderStep() {
  document.getElementById('fbody').innerHTML = STEPS[cur]();
  document.getElementById('bbwrap').innerHTML = cur > 0
    ? `<button class="bbk" onclick="goBack()">Back</button>`
    : `<button class="bbk" onclick="showModeSelect()">← Modes</button>`;
  document.getElementById('bnxt').textContent = cur === TOTAL - 1 ? 'Submit insight' : 'Continue';
  document.getElementById('plbl').textContent = STEP_LABELS[cur];
  document.getElementById('ptime').textContent = TIMES[cur];
  document.getElementById('pfill').style.width = Math.max(9, Math.round((cur / TOTAL) * 100)) + '%';
  document.querySelector('.fc').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── Guided pickers ──
function pickSource(k) { ans.sourceType=k; ans._es=false; if(k!=='Other') ans.otherSource=''; renderStep(); }
function pickServiceLine(k) { ans.serviceLine=k; ans._esl=false; ans.trying=''; ans._goalIsCustom=false; ans._customTrying=''; ans._et=false; renderStep(); }
function pickGoal(idx) { const sl=SERVICE_LINES.find(s=>s.k===ans.serviceLine); ans.trying=(sl?sl.jobs:[])[idx]; ans._goalIsCustom=false; ans._customTrying=''; ans._et=false; renderStep(); }
function pickGoalOther() { ans._goalIsCustom=true; ans.trying=''; ans._et=false; renderStep(); setTimeout(()=>{const el=document.getElementById('f-trying-custom');if(el)el.focus();},50); }
function pickFriction(cat) { ans.frictionCat=cat; ans._efriction=false; ans._efrcat=false; if(cat!=='Other') ans._customFriction=''; renderStep(); setTimeout(()=>{if(cat==='Other'){const el=document.getElementById('f-friction-custom');if(el)el.focus();}},50); }
function pickSev(k) { ans.severity=k; ans._esev=false; renderStep(); setTimeout(()=>advance(),300); }
function pickFreq(k) { ans.frequency=k; ans._efreq=false; renderStep(); setTimeout(()=>advance(),300); }

// ── Guided validation ──
function validate() {
  if (cur===0) {
    const name=document.getElementById('f-name')?.value.trim()||'';
    const email=document.getElementById('f-email')?.value.trim()||'';
    ans._en=!name; ans._ee=!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if(ans._en||ans._ee){renderStep();return false;}
    ans.submitterName=name; ans.submitterEmail=email; return true;
  }
  if (cur===1) {
    if(!ans.sourceType){ans._es=true;renderStep();return false;}
    if(ans.sourceType==='Other'){const v=document.getElementById('f-other-src')?.value.trim()||'';if(!v){ans._eo=true;renderStep();return false;}ans.otherSource=v;ans._eo=false;}
    return true;
  }
  if (cur===2) {
    const first=document.getElementById('f-first')?.value.trim()||'';
    const email=document.getElementById('f-cemail')?.value.trim()||'';
    ans._ef=!first; ans._ecemail=!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if(ans._ef||ans._ecemail){renderStep();return false;}
    ans.firstName=first; ans.contactEmail=email;
    ans.lastName=document.getElementById('f-last')?.value.trim()||'';
    ans.company=document.getElementById('f-company')?.value.trim()||'';
    ans.role=document.getElementById('f-role')?.value.trim()||'';
    ans.contact=[ans.firstName,ans.lastName].filter(Boolean).join(' ')+(ans.company?', '+ans.company:'');
    return true;
  }
  if (cur===3) { if(!ans.serviceLine){ans._esl=true;renderStep();return false;} return true; }
  if (cur===4) {
    if(ans._goalIsCustom){const v=document.getElementById('f-trying-custom')?.value.trim()||'';if(!v){ans._et=true;renderStep();return false;}ans._customTrying=v;ans.trying=v;ans._et=false;}
    else if(!ans.trying){ans._et=true;renderStep();return false;}
    return true;
  }
  if (cur===5) {
    let ok=true;
    if(!ans.frictionCat){ans._efriction=true;ok=false;}
    else{ans._efriction=false;if(ans.frictionCat==='Other'){const v=document.getElementById('f-friction-custom')?.value.trim()||'';if(!v){ans._efrcat=true;ok=false;}else{ans._efrcat=false;ans._customFriction=v;}}}
    const pain=document.getElementById('f-pain')?.value.trim()||'';
    if(!pain){ans._epain=true;ok=false;}else{ans._epain=false;ans.pain=pain;}
    if(!ok){renderStep();return false;}
    ans.painPattern=ans.frictionCat==='Other'?(ans._customFriction||'Other'):ans.frictionCat;
    return true;
  }
  if (cur===6) { ans.quote=document.getElementById('f-quote')?.value.trim()||''; return true; }
  if (cur===7) { if(!ans.severity){ans._esev=true;renderStep();return false;} return true; }
  if (cur===8) { if(!ans.frequency){ans._efreq=true;renderStep();return false;} return true; }
  return true;
}

function advance() { if(!validate())return; if(cur<TOTAL-1){cur++;renderStep();}else{doSubmit();} }
function goBack() { if(cur>0){cur--;renderStep();} }
function confirmCancel() { if(confirm("Cancel? Your answers won't be saved.")){showModeSelect();} }

async function extractTranscript() {
  const name = document.getElementById('tr-name')?.value.trim() || '';
  const email = document.getElementById('tr-email')?.value.trim() || '';
  const text = document.getElementById('tr-text')?.value.trim() || '';
  const errEl = document.getElementById('tr-err');

  if (!name || !email || !text) {
    errEl.textContent = 'Please fill in your name, email, and paste a transcript.';
    errEl.classList.add('show');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.classList.add('show');
    return;
  }

  // Store submitter info (preserved across back navigation)
  ans.submitterName = name;
  ans.submitterEmail = email;
  ans._trName = name;
  ans._trEmail = email;

  // Show loading
  document.getElementById('fbody').innerHTML = `
    <div style="padding:60px 28px;text-align:center">
      <div class="sico" style="animation:spin 1s linear infinite;margin:0 auto 20px">
        <svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#1a9e6e;fill:none;stroke-width:2">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
      <div style="font-size:15px;font-weight:600;color:#1e293b;margin-bottom:6px">Claude is reading your transcript…</div>
      <div style="font-size:13px;color:#94a3b8">Extracting insight, contact details, severity and GXM area</div>
    </div>`;

  let rawResponse = null;
  try {
    const res = await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'extractTranscript', transcript: text }),
      headers: { 'Content-Type': 'text/plain' }
    });
    rawResponse = await res.text();
    const data = JSON.parse(rawResponse);
    if (!data.ok || !data.extracted) throw new Error(data.error || 'Apps Script returned ok:false with no error message');
    extracted = data.extracted;
    showReviewScreen();
  } catch (err) {
    console.error('Extraction failed:', err, 'Raw response:', rawResponse);
    const errDetail = (err.message || String(err)).replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const rawDisplay = (rawResponse||'No response received').slice(0,400).replace(/</g,'&lt;').replace(/>/g,'&gt;');
    document.getElementById('fbody').innerHTML = `
      <div style="padding:28px;text-align:center">
        <div style="font-size:32px;margin-bottom:16px">⚠️</div>
        <div style="font-size:15px;font-weight:600;color:#1e293b;margin-bottom:8px">Extraction failed</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:16px;line-height:1.6">${errDetail}</div>
        <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin-bottom:20px;text-align:left">
          <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Server response</div>
          <div style="font-size:11.5px;color:#475569;font-family:monospace;word-break:break-all;max-height:80px;overflow:auto">${rawDisplay}</div>
        </div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="bnxt" onclick="startTranscript()">Try again</button>
          <button class="bbk" onclick="showModeSelect()">Change mode</button>
        </div>
      </div>`;
  }
}

function reviewSelectField(label, key, value, options) {
  const opts = options.map(o =>
    `<option value="${o}"${o===value?' selected':''}>${o}</option>`
  ).join('');
  return `<div class="review-field">
    <div class="review-label">${label}</div>
    <select class="review-input" style="display:block;width:100%;padding:6px 8px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;color:#1e293b;background:#fff;font-family:inherit"
      onchange="extracted['${key}']=this.value;document.getElementById('rv-${key}').textContent=this.value">
      ${opts}
    </select>
  </div>`;
}

function showReviewScreen() {

  }

  document.getElementById('fbody').innerHTML = `
    <div style="padding:24px 28px">

        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#64748b;fill:none;stroke-width:2"><polyline points="15 18 9 12 15 6"/></svg>
        Edit transcript
      </button>
      <div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px">Review extracted insight</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.5">Claude extracted the following from your transcript. Review and edit anything before saving.</div>

      <div style="display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0">

        <span style="font-size:12px;color:#166534;font-weight:500">AI-extracted — click <strong>Edit</strong> on any field to correct it</span>
      </div>

      ${reviewField('Summary (AI)', 'aiSummary', e.aiSummary)}
      ${reviewField('Who — contact name', 'firstName', e.firstName)}

      ${reviewField('What they were trying to do', 'trying', e.trying)}

      ${reviewField('Direct quote', 'quote', e.quote||'')}
      ${reviewSelectField('Severity', 'severity', e.severity, ['Critical','Significant','Minor'])}

      ${reviewField('GXM area', 'relatedFeature', e.relatedFeature)}

      <button class="bnxt" style="width:100%;margin-top:8px" onclick="submitExtracted()">

}

function toggleEdit(key) {
  const valEl = document.getElementById(`rv-${key}`);
  const inputEl = document.getElementById(`re-${key}`);
  if (!inputEl) return;
  const isHidden = inputEl.style.display === 'none';
  valEl.style.display = isHidden ? 'none' : '';
  inputEl.style.display = isHidden ? '' : 'none';
  if (isHidden) { inputEl.focus(); inputEl.select(); }
}

async function submitExtracted() {
  const e = extracted;

  // Normalise enums — Claude sometimes returns slight variations
  const VALID_SOURCES   = ['LSP','Customer','Sales','Ops','Internal','Other'];
  const VALID_SL        = ['Payroll','Entities','Entities Plus','HR','Books & Tax','Tax','EoR','Not service-specific'];
  const VALID_FRICTION  = ['Navigation & Findability','System Feedback','Process Complexity','Data & Accuracy','Performance & Reliability','Access & Permissions','Other'];
  const VALID_SEV       = ['Critical','Significant','Minor'];
  const VALID_FREQ      = ['Always','Sometimes','First time'];
  const VALID_AREAS     = ['Access & Entry Points','Dashboard','Entity Management','Process & Workflow Engine','Task Execution Layer','Communication Layer','Calendar & Time Navigation','File Management','Notifications & Feedback','Approval & Release Flow','Employee Self-Service','Data Layer & Matching'];

  function closest(val, list) {
    if (!val) return '';
    const v = val.trim();
    // Exact match first
    const exact = list.find(x => x.toLowerCase() === v.toLowerCase());
    if (exact) return exact;
    // Partial match
    const partial = list.find(x => x.toLowerCase().includes(v.toLowerCase()) || v.toLowerCase().includes(x.toLowerCase()));
    return partial || '';
  }

  const sourceLabel   = closest(e.sourceLabel, VALID_SOURCES) || 'Other';
  const serviceLine   = closest(e.serviceLine, VALID_SL)      || '';
  const frictionCat   = closest(e.frictionCategory || e.painPattern || e.frictionCat, VALID_FRICTION) || 'Other';
  const severity      = closest(e.severity, VALID_SEV)        || 'Significant';
  const frequency     = closest(e.frequency, VALID_FREQ)      || 'Sometimes';
  const relatedFeature = closest(e.relatedFeature, VALID_AREAS) || '';

  const rec = {
    submitterName:   ans.submitterName,
    submitterEmail:  ans.submitterEmail,
    sourceType:      sourceLabel,
    sourceLabel:     sourceLabel,
    firstName:       e.firstName    || '',
    lastName:        e.lastName     || '',
    company:         e.company      || '',
    role:            e.role         || '',
    contactEmail:    e.contactEmail || '',
    contact: [e.firstName, e.lastName].filter(Boolean).join(' ') + (e.company ? ', ' + e.company : ''),
    serviceLine:     serviceLine,
    trying:          e.trying       || '',
    painPattern:     frictionCat,
    frictionCat:     frictionCat,
    pain:            e.pain         || '',
    quote:           e.quote        || '',
    severity:        severity,
    frequency:       frequency,
    aiSummary:       e.aiSummary    || '',
    relatedFeature:  relatedFeature,
    problemType:     e.problemType  || '',
    jobToBeDone:     e.jobToBeDone  || '',
    confidenceScore: e.confidenceScore || 0.7,
    date:  new Date().toISOString().split('T')[0],
    ts:    Date.now(),
    id:    Date.now().toString(36),
    status: 'new',
    captureMethod: 'transcript',
  };
  await doSubmit(rec);
}

// ════════════════════════════════════════════
// SHARED SUBMIT + SUCCESS
// ════════════════════════════════════════════
async function doSubmit(prebuiltRec) {
  let rec;

  if (prebuiltRec) {
    // Transcript mode — record already built
    rec = prebuiltRec;
  } else {
    // Guided mode — build from ans
    const sourceLabel = ans.sourceType === 'Other' ? (ans.otherSource || 'Other') : ans.sourceType;
    rec = {
      ...ans,
      sourceLabel,
      painPattern: ans.painPattern || ans.frictionCat || '',
      date: new Date().toISOString().split('T')[0],
      ts: Date.now(),
      id: Date.now().toString(36),
      status: 'new',
      captureMethod: 'guided',
      aiSummary: '',
      relatedFeature: '',
      problemType: '',
      jobToBeDone: '',
      confidenceScore: 0.7,
    };
    Object.keys(rec).filter(k => k.startsWith('_')).forEach(k => delete rec[k]);
  }

  showChrome(false);

  // Guided mode: enrich with Claude first
  if (!prebuiltRec) {
    showLoading('Claude is analysing your insight…', 'Classifying the GXM area and generating a summary.');
    try {
      const enrichRes = await fetch(SHEETS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'enrich', insight: rec }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const enrichData = await enrichRes.json();
      if (enrichData.ok && enrichData.enriched) {
        const en = enrichData.enriched;
        rec.relatedFeature  = en.relatedFeature  || '';
        rec.aiSummary       = en.aiSummary        || '';
        rec.problemType     = en.problemType      || '';
        rec.jobToBeDone     = en.jobToBeDone      || '';
        rec.confidenceScore = en.confidenceScore  || 0.7;
      } else {
        rec.aiSummary = (rec.pain || '').slice(0, 120);
      }
    } catch (err) {
      rec.aiSummary = (rec.pain || '').slice(0, 120);
    }
    showLoading('Saving insight…', 'Almost done.');
  }

  // Save to localStorage
  const all = loadAll();
  all.push(rec);
  saveAll(all);

  // Save to Sheets
  let sheetsSaved = false;
  try {
    const res = await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify(rec),
      headers: { 'Content-Type': 'text/plain' }
    });
    const data = await res.json();
    sheetsSaved = data.ok === true;
  } catch (err) {
    console.warn('Sheets POST failed:', err);
  }

  const savedMsg = sheetsSaved ? 'Saved and shared with your team.' : 'Saved locally — will sync when Sheets is reachable.';

  document.getElementById('fbody').innerHTML = `
    <div class="succ">
      <div class="sico"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:16px">Insight captured</div>
      ${rec.aiSummary ? `
      <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px 18px;margin-bottom:14px;text-align:left">
        <div style="font-size:10.5px;font-weight:700;color:#1a9e6e;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Summary</div>
        <div style="font-size:13.5px;color:#1e293b;line-height:1.6">${rec.aiSummary}</div>
      </div>` : ''}
      ${rec.relatedFeature ? `
      <div style="display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:#166534;margin-bottom:16px">
        <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#1a9e6e;fill:none;stroke-width:2.5"><polyline points="20 6 9 17 4 12"/></svg>
        ${rec.relatedFeature}
      </div>` : ''}
      <div style="font-size:13px;color:#94a3b8;margin-bottom:20px">${savedMsg}</div>
      <button class="bnxt" style="width:100%;max-width:260px" onclick="showModeSelect()">Log another insight</button>
    </div>`;
}

          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>

}

// ── Storage ──
function loadAll() { try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch(e){return [];} }
function saveAll(data) { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){} }

// ── Init ──
showModeSelect();
