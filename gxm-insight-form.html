<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GXM Insight Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light only}
*{box-sizing:border-box;margin:0;padding:0;color-scheme:light only}
html,body{background:#f8fafc;font-family:'Inter',-apple-system,sans-serif;color:#1e293b;font-size:14px;min-height:100vh}
.topnav{background:#fff;border-bottom:1.5px solid #e2e8f0;padding:0 24px;display:flex;height:52px;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:#1a9e6e;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.logo-name{font-size:14px;font-weight:600;color:#1e293b}
.nav-link{font-size:13px;color:#64748b;text-decoration:none}
.nav-link:hover{color:#1a9e6e}
.page{padding:32px 24px;max-width:620px;margin:0 auto}
.fc{background:#fff;border:1.5px solid #e2e8f0;border-radius:10px}
.ftop{padding:24px 28px 0}
.ftitle{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:4px}
.fsub{font-size:13px;color:#64748b;margin-bottom:18px}
.prow{display:flex;justify-content:space-between;margin-bottom:7px}
.plbl{font-size:11px;font-weight:700;color:#1a9e6e;text-transform:uppercase;letter-spacing:.07em}
.ptime{font-size:11px;color:#94a3b8}
.ptrack{height:4px;background:#e2e8f0;border-radius:2px}
.pfill{height:100%;background:#1a9e6e;border-radius:2px;transition:width .4s ease}
.fbody{padding:24px 28px}
.sey{font-size:10.5px;font-weight:700;color:#1a9e6e;text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px}
.stit{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px}
.shin{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.55}
.sdiv{font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 10px;padding-bottom:7px;border-bottom:1px solid #e2e8f0}
.fstack{display:flex;flex-direction:column;gap:14px}
.fld{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:12.5px;font-weight:600;color:#1e293b}
.req{color:#dc2626;font-size:11px;margin-left:2px}
.opt{font-size:11px;color:#94a3b8;font-weight:400;margin-left:4px}
input.inp,textarea.inp{display:block;width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13.5px;color:#1e293b;background:#fff;outline:none;font-family:inherit;resize:none;line-height:1.5;transition:border-color .15s,box-shadow .15s}
input.inp:focus,textarea.inp:focus{border-color:#1a9e6e;box-shadow:0 0 0 3px rgba(26,158,110,.1)}
input.inp::placeholder,textarea.inp::placeholder{color:#94a3b8}
input.inp.err,textarea.inp.err{border-color:#dc2626}
.ferr{font-size:11.5px;color:#dc2626;margin-top:4px;display:none}
.ferr.show{display:block}
/* Radio cards */
.rgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:10px}
.rc{border:1.5px solid #e2e8f0;border-radius:8px;padding:12px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;background:#fff;user-select:none;transition:border-color .13s,background .13s}
.rc:hover{border-color:#1a9e6e;background:rgba(26,158,110,.05)}
.rc.sel{border-color:#1a9e6e;background:rgba(26,158,110,.08)}
.rci{width:16px;height:16px;border-radius:50%;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .13s}
.rc.sel .rci{border-color:#1a9e6e;background:#1a9e6e}
.rcd{width:6px;height:6px;border-radius:50%;background:#fff;display:none}
.rc.sel .rcd{display:block}
.rct{font-size:12.5px;font-weight:600;color:#1e293b;margin-bottom:2px;line-height:1.3}
.rc.sel .rct{color:#1a9e6e}
.rcs{font-size:11px;color:#64748b;line-height:1.35}
/* Service line cards */
.sl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sl-card{border:1.5px solid #e2e8f0;border-radius:8px;padding:14px;cursor:pointer;background:#fff;user-select:none;transition:border-color .13s,background .13s;display:flex;flex-direction:column;gap:6px}
.sl-card:hover{border-color:#1a9e6e;background:rgba(26,158,110,.05)}
.sl-card.sel{border-color:#1a9e6e;background:rgba(26,158,110,.08)}
.sl-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sl-name{font-size:13px;font-weight:600;color:#1e293b}
.sl-card.sel .sl-name{color:#1a9e6e}
.sl-desc{font-size:11px;color:#64748b;line-height:1.4}
/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .13s;user-select:none}
.chip:hover{border-color:#1a9e6e;color:#1a9e6e;background:rgba(26,158,110,.05)}
.chip.sel{border-color:#1a9e6e;background:rgba(26,158,110,.08);color:#1a9e6e;font-weight:600}
/* Nav row */
.nav-row{display:flex;align-items:center;gap:10px;padding:16px 28px;border-top:1.5px solid #e2e8f0;background:#fff;border-radius:0 0 10px 10px}
.nrl{flex:1}
button.bcnl{background:transparent;border:none;padding:6px 0;font-size:13.5px;font-weight:700;color:#1e293b;cursor:pointer;text-decoration:underline;font-family:inherit}
button.bbk{background:#fff;border:2px solid #1a9e6e;border-radius:8px;padding:9px 22px;font-size:13.5px;font-weight:600;color:#1a9e6e;cursor:pointer;font-family:inherit}
button.bbk:hover{background:rgba(26,158,110,.08)}
button.bnxt{background:#1a9e6e;border:2px solid #1a9e6e;border-radius:8px;padding:9px 22px;font-size:13.5px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit}
button.bnxt:hover{background:#158a5e;border-color:#158a5e}
/* Success */
.succ{text-align:center;padding:40px 16px}
.sico{width:52px;height:52px;border-radius:50%;background:rgba(26,158,110,.1);border:2px solid #1a9e6e;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.sico svg{width:24px;height:24px;stroke:#1a9e6e;stroke-width:2.5;fill:none}
.sstat{display:inline-flex;gap:6px;align-items:center;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 14px;font-size:13px;color:#64748b;margin:10px 0 20px}
.sstat strong{color:#1a9e6e;font-weight:700}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topnav">
  <div class="logo">
    <div class="logo-mark">GX</div>
    <div class="logo-name">GXM Insight Capture</div>
  </div>
  <a class="nav-link" href="gxm-dashboard.html">View dashboard →</a>
</div>
<div class="page">
  <div class="fc">
    <div class="ftop" id="ftop">
      <div class="ftitle">Log a GXM insight</div>
      <div class="fsub">One step at a time — most answers are a single tap.</div>
      <div class="prow">
        <span class="plbl" id="plbl">Before you begin</span>
        <span class="ptime" id="ptime">About 1 min</span>
      </div>
      <div class="ptrack"><div class="pfill" id="pfill" style="width:9%"></div></div>
    </div>
    <div class="fbody" id="fbody"></div>
    <div class="nav-row" id="navrow">
      <div class="nrl"><button class="bcnl" onclick="confirmCancel()">Cancel</button></div>
      <span id="bbwrap"></span>
      <button class="bnxt" id="bnxt" onclick="advance()">Continue</button>
    </div>
  </div>
</div>

<script>
// ── Config ──
const STORAGE_KEY = 'gxm_insights_v1';
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzicj7OL5vCQ8tB6KfwxpifX7uZB4niEQva58olsrA68DVCmJdeVkpHwNrZ0NY5bfcPWA/exec';

// ── Data ──
const TIMES = ['About 1 min','About 50s','About 42s','About 34s','About 26s','About 18s','About 12s','About 6s','Almost done'];
const STEP_LABELS = ['Before you begin','Step 1 of 8','Step 2 of 8','Step 3 of 8','Step 4 of 8','Step 5 of 8','Step 6 of 8','Step 7 of 8','Step 8 of 8'];
const TOTAL = 9;

const SOURCES = [
  {k:'LSP',d:'Local Service Partner'},
  {k:'Customer',d:'End customer or user'},
  {k:'Sales',d:'Sales team member'},
  {k:'Ops',d:'Internal operations'},
  {k:'Internal',d:'Other internal team'},
  {k:'Other',d:'Specify below'},
];

const SERVICE_LINES = [
  {k:'Payroll',icon:'💳',color:'#f0f9ff',desc:'Payroll cycles and payslip processing',jobs:['Upload payslips','Match payslips to employees','Validate payroll data','Submit payroll for approval','Track payroll status']},
  {k:'Entities',icon:'🏢',color:'#f0fdf4',desc:'Entity profiles and governance',jobs:['View entity profile','Manage directors and shareholders','Access entity-related documents','Navigate to active processes']},
  {k:'Entities Plus',icon:'⭐',color:'#fefce8',desc:'Legal and compliance obligations',jobs:['Track compliance deadlines','Submit required filings','Manage corporate changes','Coordinate with registered agents']},
  {k:'HR',icon:'👥',color:'#fdf4ff',desc:'Employee data and HR administration',jobs:['Manage employee records','Support onboarding and offboarding','Handle HR-related documentation','Coordinate with payroll processes']},
  {k:'Books & Tax',icon:'📊',color:'#fff7ed',desc:'Financial tracking and reporting',jobs:['Record financial transactions','Prepare financial statements','Manage tax filings','Reconcile accounts']},
  {k:'Tax',icon:'🧾',color:'#fef2f2',desc:'Tax compliance and filings',jobs:['Submit tax filings','Track tax deadlines','Manage VAT/GST reporting','Ensure compliance with local regulations']},
  {k:'EoR',icon:'🌍',color:'#f0fdfa',desc:'Employer of Record services',jobs:['Manage employee contracts','Handle off-cycle changes','Ensure compliance with local employment laws','Coordinate payroll and HR activities']},
  {k:'Not service-specific',icon:'⚙️',color:'#f8fafc',desc:'General platform feedback',jobs:['Navigate the platform','Find information','Manage notifications','Configure settings','Access reports']},
];

const FRICTION_CATS = ['Navigation & Findability','System Feedback','Process Complexity','Data & Accuracy','Performance & Reliability','Access & Permissions','Other'];

// ── State ──
let cur = 0;
let ans = {};

// ── Helpers ──
function radio(label, sub, selected, onclick) {
  return `<div class="rc${selected?' sel':''}" onclick="${onclick}">
    <div class="rci"><div class="rcd"></div></div>
    <div><div class="rct">${label}</div><div class="rcs">${sub}</div></div>
  </div>`;
}

function chip(label, selected, onclick) {
  return `<div class="chip${selected?' sel':''}" onclick="${onclick}">${label}</div>`;
}

function errMsg(msg, show) {
  return `<div class="ferr${show?' show':''}">${msg}</div>`;
}

// ── Step renderers ──
function r0() {
  return `
    <div class="sey">Before you begin</div>
    <div class="stit">Your details</div>
    <div class="shin">We'll use this to attribute the insight and follow up if needed.</div>
    <div class="fstack">
      <div class="fld">
        <label class="flbl">Your name<span class="req">*</span></label>
        <input class="inp${ans._en?' err':''}" id="f-name" placeholder="e.g. Desirae Herwitz" value="${ans.submitterName||''}" autocomplete="name">
        ${errMsg('Please enter your name', ans._en)}
      </div>
      <div class="fld">
        <label class="flbl">Your email<span class="req">*</span></label>
        <input class="inp${ans._ee?' err':''}" id="f-email" type="email" placeholder="e.g. desirae@hspgroup.com" value="${ans.submitterEmail||''}" autocomplete="email">
        ${errMsg('Please enter a valid email', ans._ee)}
      </div>
    </div>`;
}

function r1() {
  return `
    <div class="sey">Step 1 of 9</div>
    <div class="stit">Who did this come from?</div>
    <div class="shin">Select the source type for this insight.</div>
    <div class="rgrid">
      ${SOURCES.map(s => radio(s.k, s.d, ans.sourceType===s.k, `pickSource('${s.k}')`)).join('')}
    </div>
    ${ans.sourceType==='Other' ? `
      <div class="fld" style="margin-top:10px">
        <label class="flbl">Describe the source<span class="req">*</span></label>
        <input class="inp${ans._eo?' err':''}" id="f-other-src" placeholder="e.g. Partner agency..." value="${ans.otherSource||''}">
        ${errMsg('Please describe the source', ans._eo)}
      </div>` : ''}
    ${errMsg('Please select a source type', !ans.sourceType && ans._es)}`;
}

function r2() {
  return `
    <div class="sey">Step 2 of 9</div>
    <div class="stit">Contact details</div>
    <div class="shin">Who did you speak with? First name and email are required.</div>
    <div class="fstack">
      <div class="fld">
        <label class="flbl">First name<span class="req">*</span></label>
        <input class="inp${ans._ef?' err':''}" id="f-first" placeholder="e.g. Maria" value="${ans.firstName||''}" autocomplete="given-name">
        ${errMsg('First name is required', ans._ef)}
      </div>
      <div class="fld">
        <label class="flbl">Last name<span class="opt">(optional)</span></label>
        <input class="inp" id="f-last" placeholder="e.g. González" value="${ans.lastName||''}" autocomplete="family-name">
      </div>
      <div class="fld">
        <label class="flbl">Email<span class="req">*</span></label>
        <input class="inp${ans._ecemail?' err':''}" id="f-cemail" type="email" placeholder="e.g. maria@empresa.com" value="${ans.contactEmail||''}" autocomplete="email">
        ${errMsg('Please enter a valid email', ans._ecemail)}
      </div>
      <div class="fld">
        <label class="flbl">Company<span class="opt">(optional)</span></label>
        <input class="inp" id="f-company" placeholder="e.g. Grupo Fiscal BR" value="${ans.company||''}" autocomplete="organization">
      </div>
      <div class="fld">
        <label class="flbl">Role<span class="opt">(optional)</span></label>
        <input class="inp" id="f-role" placeholder="e.g. Compliance Manager" value="${ans.role||''}" autocomplete="organization-title">
      </div>
    </div>`;
}

function r3() {
  return `
    <div class="sey">Step 3 of 9</div>
    <div class="stit">Which service line does this relate to?</div>
    <div class="shin">Select the area they were working in.</div>
    <div class="sl-grid">
      ${SERVICE_LINES.map(s => `
        <div class="sl-card${ans.serviceLine===s.k?' sel':''}" onclick="pickServiceLine('${s.k}')">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="sl-icon" style="background:${s.color}">${s.icon}</div>
            <div class="sl-name">${s.k}</div>
          </div>
          <div class="sl-desc">${s.desc}</div>
        </div>`).join('')}
    </div>
    ${errMsg('Please select a service line', !ans.serviceLine && ans._esl)}`;
}

function r4() {
  const sl = SERVICE_LINES.find(s => s.k === ans.serviceLine);
  const jobs = sl ? sl.jobs : ['Navigate the platform','Find information','Complete a task'];
  return `
    <div class="sey">Step 4 of 9</div>
    <div class="stit">What were they trying to do?</div>
    <div class="shin">Tasks specific to <strong>${ans.serviceLine||'the platform'}</strong> — tap the closest one or pick Other.</div>
    <div class="chips">
      ${jobs.map((j,i) => chip(j, ans.trying===j && !ans._goalIsCustom, `pickGoal(${i})`)).join('')}
      ${chip('Other', ans._goalIsCustom, "pickGoalOther()")}
    </div>
    ${ans._goalIsCustom ? `
      <div class="fld">
        <label class="flbl">Describe their goal<span class="req">*</span></label>
        <input class="inp${ans._et?' err':''}" id="f-trying-custom" placeholder="Describe what they were trying to accomplish..." value="${ans._customTrying||''}">
        ${errMsg('Please describe their goal', ans._et)}
      </div>` : ''}
    ${errMsg('Please select a goal or choose Other', !ans.trying && !ans._goalIsCustom && ans._et)}`;
}

function r5() {
  return `
    <div class="sey">Step 5 of 9</div>
    <div class="stit">What was the friction?</div>
    <div class="shin">Pick the <strong>category</strong> first, then describe what specifically happened.</div>
    <div class="sdiv">1 — Friction category<span style="color:#dc2626;margin-left:4px">*</span></div>
    <div class="chips">
      ${FRICTION_CATS.filter(c => c !== 'Other').map(c => chip(c, ans.frictionCat===c, `pickFriction('${c}')`)).join('')}
      ${chip('Other', ans.frictionCat==='Other', "pickFriction('Other')")}
    </div>
    ${ans.frictionCat==='Other' ? `
      <div class="fld" style="margin-bottom:10px">
        <label class="flbl">Describe the category<span class="req">*</span></label>
        <input class="inp${ans._efrcat?' err':''}" id="f-friction-custom" placeholder="e.g. Integration issue..." value="${ans._customFriction||''}">
        ${errMsg('Please describe the friction category', ans._efrcat)}
      </div>` : ''}
    ${errMsg('Please select a friction category', !ans.frictionCat && ans._efriction)}
    <div class="sdiv">2 — Describe what happened<span style="color:#dc2626;margin-left:4px">*</span></div>
    <div class="fld">
      <textarea class="inp${ans._epain?' err':''}" id="f-pain" rows="4" placeholder='Be specific — e.g. "Couldn\'t match payslips — employee name format didn\'t match the registry"'>${ans.pain||''}</textarea>
      ${errMsg('Please describe what happened', ans._epain)}
    </div>`;
}

function r6() {
  return `
    <div class="sey">Step 6 of 9</div>
    <div class="stit">Direct quote</div>
    <div class="shin">The most memorable thing they said verbatim. Skip if nothing stands out.</div>
    <div class="fld">
      <label class="flbl">Quote<span class="opt">(optional)</span></label>
      <textarea class="inp" id="f-quote" rows="3" placeholder='"My clients pay for this to save time, but I spend more time in Excel"'>${ans.quote||''}</textarea>
    </div>`;
}

function r7() {
  const sevs = [
    {k:'Critical',d:'Blocked or losing trust'},
    {k:'Significant',d:'Major friction, workarounds needed'},
    {k:'Minor',d:'Nice to have, low urgency'},
  ];
  const SEV_C = {Critical:'#dc2626',Significant:'#d97706',Minor:'#1a9e6e'};
  return `
    <div class="sey">Step 7 of 9</div>
    <div class="stit">How severe was it?</div>
    <div class="shin">Selecting an option advances automatically.</div>
    <div class="rgrid">
      ${sevs.map(s => `
        <div class="rc${ans.severity===s.k?' sel':''}" onclick="pickSev('${s.k}')">
          <div class="rci"><div class="rcd"></div></div>
          <div>
            <div class="rct" style="color:${ans.severity===s.k?(SEV_C[s.k]||'#1e293b'):'#1e293b'}">${s.k}</div>
            <div class="rcs">${s.d}</div>
          </div>
        </div>`).join('')}
    </div>
    ${errMsg('Please select a severity level', ans._esev)}`;
}

function r8() {
  const freqs = [
    {k:'First time',d:'Never seen this before'},
    {k:'Sometimes',d:'Happens occasionally'},
    {k:'Always',d:'Consistent, recurring issue'},
  ];
  return `
    <div class="sey">Step 8 of 9</div>
    <div class="stit">How often does this happen?</div>
    <div class="shin">Helps distinguish one-off issues from systemic problems. Selecting advances automatically.</div>
    <div class="rgrid">
      ${freqs.map(f => radio(f.k, f.d, ans.frequency===f.k, `pickFreq('${f.k}')`)).join('')}
    </div>
    ${errMsg('Please select a frequency', ans._efreq)}`;
}

// ── Render ──
const STEPS = [r0,r1,r2,r3,r4,r5,r6,r7,r8];

function renderStep() {
  document.getElementById('fbody').innerHTML = STEPS[cur]();
  document.getElementById('bbwrap').innerHTML = cur > 0 ? `<button class="bbk" onclick="goBack()">Back</button>` : '';
  document.getElementById('bnxt').textContent = cur === TOTAL - 1 ? 'Submit insight' : 'Continue';
  document.getElementById('plbl').textContent = STEP_LABELS[cur];
  document.getElementById('ptime').textContent = TIMES[cur];
  document.getElementById('pfill').style.width = Math.max(9, Math.round((cur / TOTAL) * 100)) + '%';
  // Scroll to top of card
  document.querySelector('.fc').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── Pickers ──
function pickSource(k) {
  ans.sourceType = k; ans._es = false;
  if (k !== 'Other') ans.otherSource = '';
  renderStep();
}

function pickServiceLine(k) {
  ans.serviceLine = k; ans._esl = false;
  // Reset goal when service line changes
  ans.trying = ''; ans._goalIsCustom = false; ans._customTrying = ''; ans._et = false;
  renderStep();
}

function pickGoal(idx) {
  const sl = SERVICE_LINES.find(s => s.k === ans.serviceLine);
  const jobs = sl ? sl.jobs : [];
  ans.trying = jobs[idx];
  ans._goalIsCustom = false;
  ans._customTrying = '';
  ans._et = false;
  renderStep();
}

function pickGoalOther() {
  ans._goalIsCustom = true;
  ans.trying = '';
  ans._et = false;
  renderStep();
  setTimeout(() => { const el = document.getElementById('f-trying-custom'); if (el) el.focus(); }, 50);
}

function pickFriction(cat) {
  ans.frictionCat = cat;
  ans._efriction = false;
  ans._efrcat = false;
  if (cat !== 'Other') ans._customFriction = '';
  renderStep();
  setTimeout(() => { if (cat === 'Other') { const el = document.getElementById('f-friction-custom'); if (el) el.focus(); } }, 50);
}

function pickSev(k) {
  ans.severity = k; ans._esev = false;
  renderStep();
  setTimeout(() => advance(), 300);
}

function pickFreq(k) {
  ans.frequency = k; ans._efreq = false;
  renderStep();
  setTimeout(() => advance(), 300);
}

// ── Validation ──
function validate() {
  // Step 0: submitter info
  if (cur === 0) {
    const name = document.getElementById('f-name')?.value.trim() || '';
    const email = document.getElementById('f-email')?.value.trim() || '';
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    ans._en = !name;
    ans._ee = !email || !emailOk;
    if (ans._en || ans._ee) { renderStep(); return false; }
    ans.submitterName = name;
    ans.submitterEmail = email;
    return true;
  }

  // Step 1: source
  if (cur === 1) {
    if (!ans.sourceType) { ans._es = true; renderStep(); return false; }
    if (ans.sourceType === 'Other') {
      const v = document.getElementById('f-other-src')?.value.trim() || '';
      if (!v) { ans._eo = true; renderStep(); return false; }
      ans.otherSource = v; ans._eo = false;
    }
    return true;
  }

  // Step 2: contact details
  if (cur === 2) {
    const first = document.getElementById('f-first')?.value.trim() || '';
    const email = document.getElementById('f-cemail')?.value.trim() || '';
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    ans._ef = !first;
    ans._ecemail = !email || !emailOk;
    if (ans._ef || ans._ecemail) { renderStep(); return false; }
    ans.firstName = first;
    ans.contactEmail = email;
    ans.lastName = document.getElementById('f-last')?.value.trim() || '';
    ans.company = document.getElementById('f-company')?.value.trim() || '';
    ans.role = document.getElementById('f-role')?.value.trim() || '';
    ans.contact = [ans.firstName, ans.lastName].filter(Boolean).join(' ') + (ans.company ? ', ' + ans.company : '');
    return true;
  }

  // Step 3: service line
  if (cur === 3) {
    if (!ans.serviceLine) { ans._esl = true; renderStep(); return false; }
    return true;
  }

  // Step 4: goal
  if (cur === 4) {
    if (ans._goalIsCustom) {
      const v = document.getElementById('f-trying-custom')?.value.trim() || '';
      if (!v) { ans._et = true; renderStep(); return false; }
      ans._customTrying = v;
      ans.trying = v;
      ans._et = false;
    } else if (!ans.trying) {
      ans._et = true; renderStep(); return false;
    }
    return true;
  }

  // Step 5: friction — the fixed one
  if (cur === 5) {
    let ok = true;

    // Validate category
    if (!ans.frictionCat) {
      ans._efriction = true;
      ok = false;
    } else {
      ans._efriction = false;
      // If Other, need the custom description
      if (ans.frictionCat === 'Other') {
        const v = document.getElementById('f-friction-custom')?.value.trim() || '';
        if (!v) { ans._efrcat = true; ok = false; }
        else { ans._efrcat = false; ans._customFriction = v; }
      }
    }

    // Validate description
    const pain = document.getElementById('f-pain')?.value.trim() || '';
    if (!pain) { ans._epain = true; ok = false; }
    else { ans._epain = false; ans.pain = pain; }

    if (!ok) { renderStep(); return false; }

    // Set the final painPattern value
    ans.painPattern = ans.frictionCat === 'Other' ? (ans._customFriction || 'Other') : ans.frictionCat;
    return true;
  }

  // Step 6: quote (optional)
  if (cur === 6) {
    ans.quote = document.getElementById('f-quote')?.value.trim() || '';
    return true;
  }

  // Step 7: severity
  if (cur === 7) {
    if (!ans.severity) { ans._esev = true; renderStep(); return false; }
    return true;
  }

  // Step 8: frequency
  if (cur === 8) {
    if (!ans.frequency) { ans._efreq = true; renderStep(); return false; }
    return true;
  }

  return true;
}

// ── Navigation ──
function advance() {
  if (!validate()) return;
  if (cur < TOTAL - 1) {
    cur++;
    renderStep();
  } else {
    doSubmit();
  }
}

function goBack() {
  if (cur > 0) { cur--; renderStep(); }
}

function confirmCancel() {
  if (confirm("Cancel? Your answers won't be saved.")) {
    cur = 0; ans = {}; renderStep();
  }
}

// ── Submit ──
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';
const GXM_AREAS = ['Access & Entry Points','Dashboard','Entity Management','Process & Workflow Engine','Task Execution Layer','Communication Layer','Calendar & Time Navigation','File Management','Notifications & Feedback','Approval & Release Flow','Employee Self-Service','Data Layer & Matching'];

async function doSubmit() {
  const sourceLabel = ans.sourceType === 'Other' ? (ans.otherSource || 'Other') : ans.sourceType;
  const rec = {
    ...ans,
    sourceLabel,
    painPattern: ans.painPattern || ans.frictionCat || '',
    date: new Date().toISOString().split('T')[0],
    ts: Date.now(),
    id: Date.now().toString(36),
    status: 'new',
    aiSummary: '',
    relatedFeature: '',
    problemType: '',
    jobToBeDone: '',
    confidenceScore: 0.7,
  };

  // Strip internal state flags
  Object.keys(rec).filter(k => k.startsWith('_')).forEach(k => delete rec[k]);

  // Hide form chrome
  document.getElementById('ftop').style.display = 'none';
  document.getElementById('navrow').style.display = 'none';

  // Phase 1: analysing
  showLoading('Claude is analysing your insight…', 'Classifying the GXM area and generating a structured summary.');

  // Call Claude to enrich the insight
  try {
    const prompt = `You are a product analyst for GXM, a global entity and payroll management platform. Analyse this product insight and return ONLY valid JSON with no other text.

Insight data:
- Service line: ${rec.serviceLine}
- What they were trying to do: ${rec.trying}
- Friction category: ${rec.painPattern}
- What happened: ${rec.pain}
- Direct quote: ${rec.quote || 'none'}
- Severity: ${rec.severity}
- Frequency: ${rec.frequency}
- Source: ${rec.sourceLabel}

GXM platform areas (pick the single best match):
${GXM_AREAS.join(', ')}

Return this exact JSON structure:
{
  "relatedFeature": "one of the GXM areas listed above",
  "aiSummary": "one crisp sentence summarising the core problem (max 120 chars)",
  "problemType": "normalised problem category (e.g. Missing bulk operation, Navigation gap, Silent system block)",
  "jobToBeDone": "user goal in JTBD format: verb + object + context (max 80 chars)",
  "confidenceScore": 0.85
}`;

    const res = await fetch(CLAUDE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const enriched = JSON.parse(text.replace(/```json|```/g, '').trim());

    rec.relatedFeature  = enriched.relatedFeature  || '';
    rec.aiSummary       = enriched.aiSummary        || '';
    rec.problemType     = enriched.problemType      || '';
    rec.jobToBeDone     = enriched.jobToBeDone      || '';
    rec.confidenceScore = enriched.confidenceScore  || 0.7;

  } catch (err) {
    console.warn('Claude enrichment failed, using defaults:', err);
    rec.aiSummary = rec.pain ? rec.pain.slice(0, 120) : '';
  }

  // Phase 2: saving
  showLoading('Saving insight…', 'Almost done.');

  // Save to localStorage
  const all = loadAll();
  all.push(rec);
  saveAll(all);

  // Try to save to Sheets
  let sheetsSaved = false;
  try {
    const res = await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify(rec),
      headers: { 'Content-Type': 'text/plain' }
    });
    const data = await res.json();
    sheetsSaved = data.ok === true;
  } catch (err) {
    console.warn('Sheets POST failed, localStorage used:', err);
  }

  const msg = sheetsSaved
    ? 'Saved and shared with your team.'
    : 'Saved locally — will sync when Sheets is reachable.';

  const areaTag = rec.relatedFeature
    ? `<div style="display:inline-flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:4px 10px;font-size:12px;color:#166534;margin-bottom:14px"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#1a9e6e;fill:none;stroke-width:2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4"/></svg>Classified as: <strong>${rec.relatedFeature}</strong></div>`
    : '';

  document.getElementById('fbody').innerHTML = `
    <div class="succ">
      <div class="sico"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:5px">Insight captured</div>
      ${rec.aiSummary ? `<div style="font-size:13px;color:#475569;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin-bottom:10px;line-height:1.5;text-align:left">"${rec.aiSummary}"</div>` : ''}
      ${areaTag}
      <div style="font-size:13px;color:#64748b;margin-bottom:10px">${msg}</div>
      <div class="sstat">Insight <strong>#${all.length}</strong> in the GXM repository</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="bnxt" onclick="resetForm()">Log another</button>
        <button class="bbk" onclick="window.location.href='gxm-dashboard.html'">View dashboard</button>
      </div>
    </div>`;
}

function showLoading(title, sub) {
  document.getElementById('fbody').innerHTML = `
    <div class="succ">
      <div class="sico" style="animation:spin 1s linear infinite">
        <svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#1a9e6e;fill:none;stroke-width:2">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
      <div style="font-size:14px;font-weight:600;color:#1e293b;margin-top:12px">${title}</div>
      <div style="font-size:12px;color:#94a3b8;margin-top:4px">${sub}</div>
    </div>`;
}

function resetForm() {
  cur = 0; ans = {};
  document.getElementById('ftop').style.display = '';
  document.getElementById('navrow').style.display = '';
  renderStep();
}

// ── Storage ──
function loadAll() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}
function saveAll(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

// ── Init ──
renderStep();
</script>
